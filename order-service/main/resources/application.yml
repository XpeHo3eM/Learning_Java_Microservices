spring:
  application:
    name:
      order-service
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    url: "jdbc:postgresql://localhost:5431/orders_db"
    username: postgres
    password: postgres
  sql:
    init:
      mode: always
      schema-locations: classpath:/schema.sql
  jpa:
    show-sql: true